<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'none'; style-src 'unsafe-inline';">
  <style>body { margin: 0; overflow: hidden; }</style>
</head>
<body>
<script type="module">
import * as THREE from '/three.module.js';
import { expandScene } from '/scene-codec.mjs';

let _seed = 0x12345678;
Math.random = () => {
  _seed |= 0; _seed = _seed + 0x6D2B79F5 | 0;
  let t = Math.imul(_seed ^ _seed >>> 15, 1 | _seed);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
};

const loader = new THREE.ObjectLoader();

let renderer = null;
let scene = null;
let camera = null;
let _imgSize = null;
let _camFovDeg = null;

function ensureContext(params) {
  if (renderer === null) {
    renderer = new THREE.WebGLRenderer({
      antialias: true,
      preserveDrawingBuffer: true,
      alpha: true,
    });
    renderer.setPixelRatio(1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    scene = new THREE.Scene();

    scene.add(new THREE.AmbientLight(0xffffff, 0.12));

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(2, 3, 2);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
    fillLight.position.set(-2, 1, 1);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
    rimLight.position.set(0, 2, -3);
    scene.add(rimLight);

    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    envScene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.0));
    scene.environment = pmrem.fromScene(envScene, 0.04).texture;
    scene.environmentIntensity = 0.8;
    pmrem.dispose();

    camera = new THREE.PerspectiveCamera(params.camFovDeg, 1.0, 0.01, 100);
    camera.up.set(0, 1, 0);
  }

  if (_imgSize !== params.imgSize) {
    renderer.setSize(params.imgSize, params.imgSize);
    _imgSize = params.imgSize;
  }
  if (_camFovDeg !== params.camFovDeg) {
    camera.fov = params.camFovDeg;
    camera.updateProjectionMatrix();
    _camFovDeg = params.camFovDeg;
  }
  scene.background = new THREE.Color(params.bgColor ? `#${params.bgColor}` : 0xffffff);
}

function sphericalToCartesian(thetaDeg, phiDeg, radius) {
  const theta = thetaDeg * Math.PI / 180;
  const phi = phiDeg * Math.PI / 180;
  return new THREE.Vector3(
    radius * Math.cos(phi) * Math.sin(theta),
    -radius * Math.sin(phi),
    radius * Math.cos(phi) * Math.cos(theta),
  );
}

function disposeObject(root) {
  root.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    const materials = Array.isArray(obj.material) ? obj.material : (obj.material ? [obj.material] : []);
    for (const mat of materials) {
      for (const key of Object.keys(mat)) {
        const value = mat[key];
        if (value && value.isTexture) value.dispose();
      }
      mat.dispose();
    }
  });
}

window.__renderObject = function (json, params) {
  try {
    ensureContext(params);

    expandScene(json);
    const root = loader.parse(json);
    if (!root || !root.isObject3D) {
      return { error: 'parsed scene_json is not an Object3D' };
    }

    scene.add(root);
    try {
      const n = params.thetas.length;
      const cols = Math.ceil(Math.sqrt(n));
      const rows = Math.ceil(n / cols);
      const gap = params.gap;
      const gridW = cols * params.imgSize + (cols - 1) * gap;
      const gridH = rows * params.imgSize + (rows - 1) * gap;

      const gridCanvas = document.createElement('canvas');
      gridCanvas.width = gridW;
      gridCanvas.height = gridH;
      const ctx = gridCanvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, gridW, gridH);

      for (let i = 0; i < n; i++) {
        const pos = sphericalToCartesian(params.thetas[i], params.phis[i], params.camRadius);
        camera.position.copy(pos);
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);

        const row = Math.floor(i / cols);
        const col = i % cols;
        ctx.drawImage(renderer.domElement, col * (params.imgSize + gap), row * (params.imgSize + gap));
      }

      return { data: gridCanvas.toDataURL('image/png') };
    } finally {
      scene.remove(root);
      disposeObject(root);
    }
  } catch (err) {
    return { error: err.message || String(err) };
  }
};

window.__ready = true;
</script>
</body>
</html>
